name: Cross-Platform Electron Build

on:
  push:
    tags:
      - 'v*' # Run when you push a version tag like v1.0.0

permissions:
  contents: read # required by checkout, setup-node, and artifact actions

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6  # reads pnpm version from package.json "packageManager"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron App
        run: pnpm exec quasar build --mode electron --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: quasar-build-${{ matrix.os }}
          path: dist/electron/Packaged/
          if-no-files-found: error
          compression-level: 0 # optional: speed boost
