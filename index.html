<!DOCTYPE html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="description" content="<%= productDescription %>">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">

    <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="icon" type="image/ico" href="favicon.ico">
    <link rel="manifest" href="manifest.json">

    <script>
      // Preload the header logo and landing-view icons to improve initial page load.
      // Block statement to keep the consts out of the global scope
      {
        // Mirrors the dark-mode startup logic in settingsStore.ts
        const storedDarkMode = localStorage.getItem('darkMode');
        const darkMode = storedDarkMode === 'true' ||
          (storedDarkMode === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
        // These public/ assets are referenced from Vue templates, so the browser
        // can't discover them until the app renders, which is gated on wallet
        // initialization (Suspense around WalletPage).
        const images = [darkMode ? 'images/cashonize-logo-dark.png' : 'images/cashonize-logo.png'];
        // activeWalletName is set on wallet create/import:
        // present means the wallet view, absent means onboarding
        if (localStorage.getItem('activeWalletName')) {
          images.push(
            darkMode ? 'images/settingsLightGrey.svg' : 'images/settings.svg',
            'images/copyGrey.svg',
            'images/bch-icon.png',
            'images/qrscan.svg'
          );
        } else {
          images.push(
            darkMode ? 'images/plus-square-lightGrey.svg' : 'images/plus-square.svg',
            darkMode ? 'images/import-lightGrey.svg' : 'images/import.svg'
          );
        }
        for (const href of images) {
          const link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = href;
          document.head.appendChild(link);
        }
      }
    </script>
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
