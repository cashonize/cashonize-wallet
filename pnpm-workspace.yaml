# pnpm settings (pnpm v11). As of pnpm v10+ these live here rather than in .npmrc.

# --- Supply-chain hardening (a crypto wallet: prefer over-careful) ---

# NOTE: pnpm 11 applies a built-in default minimumReleaseAge quarantine (rejects very
# freshly-published versions), which we deliberately leave in place — do NOT set
# `minimumReleaseAge: 0`, that would disable it and ship the wallet less safe than stock.
#
# TODO: tighten to an explicit 7-day quarantine once the committed lockfile's versions
# have all aged past the window:
#     minimumReleaseAge: 10080
# Not enabled yet: the project currently sits on same-day toolchain releases (quasar,
# vite/rolldown, vitest, typescript-eslint, browser-data), so 7 days today would need a
# ~52-entry minimumReleaseAgeExclude list. Plan: hold the migration until deps mature,
# then flip it on with no exclude list. (Enforced at resolution time — keep the lockfile
# frozen while waiting.)

# Exempt from the release-age quarantine: needed to pick up same-day regression fixes
# in Quasar's build tooling (e.g. v3.0.1 www-folder clean fix). Dev-only, not shipped.
minimumReleaseAgeExclude:
  - '@quasar/app-vite'
  - '@cashconnect-js/core@1.0.0-alpha.31'
  - '@cashconnect-js/nostr@1.0.0-alpha.31'

# Enforce the "engines" field (node / pnpm) instead of just warning.
engineStrict: true

# Prefer the committed lockfile; CI additionally passes --frozen-lockfile explicitly.
preferFrozenLockfile: true

# Disable pnpm's pre-command deps-status check. It false-positives on every command in
# this repo: the nested src-*/test-dapp workspace isolation files make pnpm's root-level
# structure check think deps are always stale, and it then auto-runs a failing install.
verifyDepsBeforeRun: false

fund: false

# Pin dependency versions. Must live here: pnpm v11 no longer reads the "pnpm" field from
# package.json. Nested pins use "parent>child" selector syntax.
overrides:
  '@reown/walletkit>@walletconnect/pay': '-'
  # Security-critical deps that also appear as transitive dependencies (walletkit via
  # @cashconnect-js/*, mainnet-js via @mainnet-cash/indexeddb-storage, libauth and
  # @walletconnect/core via several) — overrides pin every copy in the graph, which
  # exact versions in package.json alone can't do. Keep in sync with package.json.
  '@bitauth/libauth': 3.1.0-next.8
  '@reown/walletkit': 1.5.6
  '@walletconnect/core': 2.23.9
  mainnet-js: 3.1.7

  # Dependabot security bumps for indirect dependencies.
  tar: 7.5.21
  vite: 8.0.16
  'anymatch>picomatch': 2.3.2
  'micromatch>picomatch': 2.3.2
  picomatch: 4.0.4

# Packages explicitly allowed to run install/build lifecycle scripts. Everything else is
# blocked by pnpm; a future dep that adds an install script fails the install until
# reviewed and added here.
#   - @parcel/watcher: native file-watcher (Parcel team), dev-only, pulled via
#     sass-embedded in Quasar's build tooling. Not shipped in the wallet bundle.
# (src-electron has its own allowBuilds for electron's binary download.)
allowBuilds:
  '@parcel/watcher': true
