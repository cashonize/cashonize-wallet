# This file exists to force pnpm to install deps here, isolated from the root workspace.
# Quasar installs these when building/running the electron mode.
# https://quasar.dev/quasar-cli-vite/upgrade-guide#pnpm-related

allowBuilds:
  electron: true
  electron-builder: true
  # copies its vendored 7z binary into place for the host arch (Windows Squirrel installer)
  electron-winstaller: true
  esbuild: true
